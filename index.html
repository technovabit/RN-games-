<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Games Zone</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f0f1a">

<style>
body{
    margin:0;
    background:#05050c;
    color:white;
    font-family:Segoe UI,system-ui;
}
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:#0a0a1f;
}
.logo{
    font-size:28px;
    font-weight:900;
    background:linear-gradient(90deg,#ff3b3b,#ffb347);
    -webkit-background-clip:text;
    color:transparent;
}
.top-right{
    display:flex;
    gap:12px;
    align-items:center;
}
.coins{
    background:#14142e;
    padding:8px 16px;
    border-radius:20px;
    font-weight:bold;
}
.daily{
    background:linear-gradient(90deg,#00ffe5,#7f5cff);
    color:#000;
    padding:8px 16px;
    border-radius:20px;
    font-weight:900;
    cursor:pointer;
}
.install-btn{
    background:linear-gradient(90deg,#ffb347,#ff3b3b);
    padding:8px 16px;
    border-radius:20px;
    font-weight:900;
    cursor:pointer;
    border:none;
}
.games{
    padding:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:22px;
}
.card{
    background:#14142a;
    border-radius:18px;
    overflow:hidden;
    transition:.4s;
    position:relative;
}
.card:hover{transform:scale(1.06)}
.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}
.card h3{margin:10px}
.card button{
    margin:10px;
    width:calc(100% - 20px);
    padding:10px;
    border-radius:18px;
    border:none;
    background:linear-gradient(90deg,#00ffe5,#7f5cff);
    font-weight:bold;
    cursor:pointer;
}
.badge{
    position:absolute;
    top:10px;
    left:10px;
    background:#ff3b3b;
    padding:5px 10px;
    border-radius:14px;
    font-size:12px;
    font-weight:900;
}
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
}
.popup div{
    background:#14142e;
    padding:30px;
    border-radius:22px;
    text-align:center;
}
.popup button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:18px;
    background:#ff3b3b;
    color:white;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
  <div class="logo">Mini Games</div>
  <div class="top-right">
    <div class="coins">💰 <span id="coins">0</span></div>
    <div class="daily" onclick="claimDaily()">🎁 Daily</div>
    <button class="install-btn" onclick="installApp()">📥 Install</button>
  </div>
</header>

<section class="games" id="games"></section>

<div class="popup" id="dailyPopup">
  <div>
    <h2>🎉 Daily Reward</h2>
    <p>You earned <b>50 Coins</b></p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
/* COINS */
let coins = parseInt(localStorage.getItem("coins") || "0");
document.getElementById("coins").innerText = coins;

/* DAILY */
function claimDaily(){
    const today = new Date().toDateString();
    if(localStorage.getItem("dailyReward") === today){
        alert("Already claimed today!");
        return;
    }
    coins += 50;
    localStorage.setItem("coins", coins);
    localStorage.setItem("dailyReward", today);
    document.getElementById("coins").innerText = coins;
    document.getElementById("dailyPopup").style.display="flex";
}
function closePopup(){
    document.getElementById("dailyPopup").style.display="none";
}

/* PLAY COUNT */
let playCount = JSON.parse(localStorage.getItem("playCount") || "{}");

/* LOAD GAMES */
fetch("games.json")
.then(res => res.json())
.then(data => {
    const gamesDiv = document.getElementById("games");
    gamesDiv.innerHTML = "";
    data.forEach(game => {
        const plays = playCount[game.name] || 0;
        const trending = plays >= 5;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            ${trending ? `<div class="badge">🔥 Trending</div>` : ""}
            <img src="${game.image}">
            <h3>${game.name}</h3>
            <button onclick="playGame('${game.name}','${game.url}')">
              ▶ Play +10 Coins
            </button>`;
        gamesDiv.appendChild(card);
    });
});

/* PLAY GAME */
function playGame(name,url){
    playCount[name] = (playCount[name] || 0) + 1;
    localStorage.setItem("playCount", JSON.stringify(playCount));
    coins += 10;
    localStorage.setItem("coins", coins);
    document.getElementById("coins").innerText = coins;
    window.open(url,"_blank");
}

/* INSTALL */
let deferredPrompt = null;

window.addEventListener("beforeinstallprompt", (e)=>{
    e.preventDefault();
    deferredPrompt = e;
});

function installApp(){
    if(deferredPrompt){
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(()=> deferredPrompt=null);
    } else {
        alert("⚠️ Install available only after hosting on HTTPS (Netlify / GitHub Pages)");
    }
}
</script>

</body>
</html>
