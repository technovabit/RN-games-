<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Games Zone</title>

<!-- PWA -->
<link rel="manifest" id="manifest">
<meta name="theme-color" content="#0f0f1a">

<style>
/* ================= GLOBAL ================= */
*{box-sizing:border-box;font-family:Segoe UI,Arial}
body{
    margin:0;
    background:radial-gradient(circle at top,#12122a,#05050c);
    color:#fff;
}

/* ================= HEADER ================= */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 28px;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(14px);
    position:sticky;
    top:0;
    z-index:1000;
}
.logo{
    font-size:30px;
    font-weight:900;
    background:linear-gradient(90deg,#ff3b3b,#ffb347);
    -webkit-background-clip:text;
    color:transparent;
}
.right{display:flex;gap:12px;align-items:center}
.search{
    padding:11px 18px;
    border-radius:30px;
    border:none;
    width:230px;
    outline:none;
}
.install-btn{
    padding:10px 18px;
    border-radius:25px;
    border:none;
    background:linear-gradient(135deg,#00ffe5,#7f5cff);
    color:#000;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 0 20px #00ffe580;
}
.install-btn:hover{transform:scale(1.05)}

/* ================= HERO ================= */
.hero{
    text-align:center;
    padding:70px 20px 40px;
}
.hero h1{
    font-size:48px;
    font-weight:900;
    background:linear-gradient(90deg,#ff3b3b,#00ffe5,#7f5cff);
    -webkit-background-clip:text;
    color:transparent;
}
.hero p{opacity:.75}

/* ================= FILTER ================= */
.filters{
    text-align:center;
    margin-bottom:30px;
}
.filters button{
    margin:6px;
    padding:10px 18px;
    border-radius:25px;
    border:none;
    cursor:pointer;
    background:#1c1c2e;
    color:#fff;
}
.filters button:hover{background:#00ffe5;color:#000}

/* ================= GAMES ================= */
.games{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:28px;
    padding:30px;
}
.card{
    position:relative;
    background:#14142a;
    border-radius:22px;
    overflow:hidden;
    transform-style:preserve-3d;
    transition:.5s;
    box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.card:hover{
    transform:rotateX(10deg) rotateY(-10deg) scale(1.05);
}
.card img{
    width:100%;
    height:170px;
    object-fit:cover;
}
.card h3{
    margin:12px;
}
.card p{
    margin:0 12px 12px;
    font-size:14px;
    opacity:.7;
}
.play{
    margin:12px;
    padding:10px;
    border-radius:20px;
    border:none;
    background:linear-gradient(135deg,#ff3b3b,#ffb347);
    color:#000;
    font-weight:700;
    cursor:pointer;
    width:calc(100% - 24px);
}

/* ================= BADGES ================= */
.badge{
    position:absolute;
    top:12px;
    left:12px;
    padding:6px 12px;
    border-radius:16px;
    font-size:12px;
    font-weight:700;
}
.trending{background:#ff3b3b}
.most{background:#00ffe5;color:#000}

/* ================= FOOTER ================= */
footer{
    text-align:center;
    padding:25px;
    opacity:.5;
}

/* ================= 3D GLOW ================= */
.card::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,#00ffe533,transparent);
    opacity:0;
    transition:.5s;
}
.card:hover::after{opacity:1}
</style>
</head>

<body>

<header>
    <div class="logo">Mini Games</div>
    <div class="right">
        <input class="search" placeholder="Search games...">
        <button class="install-btn" id="installBtn">📲 Install App</button>
    </div>
</header>

<section class="hero">
    <h1>Play • Install • Enjoy</h1>
    <p>Console-like games directly in your browser</p>
</section>

<div class="filters">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('trending')">🔥 Trending</button>
    <button onclick="filter('most')">⭐ Most Played</button>
</div>

<section class="games" id="games">

    <!-- KEEPING OLD GAMES STYLE -->
    <div class="card trending">
        <span class="badge trending">🔥 Trending</span>
        <img src="https://i.imgur.com/V3xKZyR.jpg">
        <h3>Subway Runner</h3>
        <p>Endless running adventure</p>
        <button class="play">Play Now</button>
    </div>

    <div class="card most">
        <span class="badge most">⭐ Most Played</span>
        <img src="https://i.imgur.com/2pJ4Y8Z.jpg">
        <h3>Car Racing</h3>
        <p>High speed drift racing</p>
        <button class="play">Play Now</button>
    </div>

    <div class="card">
        <img src="https://i.imgur.com/Fw7pQkH.jpg">
        <h3>Snake Classic</h3>
        <p>Old school fun</p>
        <button class="play">Play Now</button>
    </div>

</section>

<footer>© 2026 Mini Games Zone</footer>

<script>
/* ========= FILTER ========= */
function filter(type){
    document.querySelectorAll('.card').forEach(c=>{
        c.style.display = (type==='all'||c.classList.contains(type))?'block':'none';
    });
}

/* ========= PWA INSTALL ========= */
let deferredPrompt;
const installBtn=document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt",e=>{
    e.preventDefault();
    deferredPrompt=e;
    installBtn.style.display="block";
});

installBtn.addEventListener("click",()=>{
    if(deferredPrompt){
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(()=>deferredPrompt=null);
    }
});

/* ========= MANIFEST ========= */
const manifest={
  name:"Mini Games Zone",
  short_name:"Games",
  start_url:".",
  display:"standalone",
  background_color:"#05050c",
  theme_color:"#0f0f1a",
  icons:[{
    src:"https://cdn-icons-png.flaticon.com/512/566/566294.png",
    sizes:"512x512",
    type:"image/png"
  }]
};
const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
document.getElementById("manifest").href=URL.createObjectURL(blob);
</script>

</body>
</html>
