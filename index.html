<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Games Zone</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#111; color:#fff; }
    header { background:#1a1a1a; padding:20px; display:flex; align-items:center; justify-content:space-between; }
    header h1 { margin:0; font-size:28px; }
    .search-box input { padding:10px; width:250px; border-radius:6px; border:none; }
    nav { background:#000; padding:10px 20px; display:flex; gap:20px; overflow-x:auto; }
    nav a { color:#fff; text-decoration:none; font-size:16px; white-space:nowrap; }
    .container { padding:20px; }
    .section-title { font-size:22px; margin:20px 0 10px; }
    .games-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:20px; }
    .game-card { background:#1a1a1a; padding:10px; border-radius:10px; text-align:center; cursor:pointer; transition:0.3s; }
    .game-card:hover { transform:scale(1.05); background:#222; }
    .game-card img { width:100%; border-radius:10px; }
    footer { text-align:center; padding:20px; background:#000; margin-top:30px; }
  </style>
</head>
<body>

<header>
  <h1>Mini Games Zone</h1>
  <div class="search-box">
    <input type="text" placeholder="Search games..." />
  </div>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Popular</a>
  <a href="#">Action</a>
  <a href="#">Racing</a>
  <a href="#">Sports</a>
  <a href="#">Puzzle</a>
  <a href="#">Adventure</a>
  <a href="#">Arcade</a>
</nav>

<div class="container">
  <h2 class="section-title">Featured Games</h2>
  <div class="games-grid" id="featuredGames">
    <!-- EMPTY — you will add fresh games later -->
  </div>

  <h2 class="section-title">Latest Games</h2>
  <div class="games-grid" id="latestGames">
    <!-- EMPTY — you will add fresh games later -->
  </div>
</div>

<footer>
  <p>© 2025 Mini Games Zone. All Rights Reserved.</p>
</footer>

</body>
</html>
